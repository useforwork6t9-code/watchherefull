<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>VideoTube6t9 · Premium Videos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
        }

        /* ===== নেভিগেশন ===== */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 5%;
            background: rgba(0, 0, 0, 0.95);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #2a2a2a;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #ff0000;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 24px;
        }

        .nav-links a {
            text-decoration: none;
            color: #f0f0f0;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #ff0000;
        }

        /* ===== হিরো সেকশন ===== */
        .hero {
            min-height: 40vh;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.5)),
                url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 6%;
            border-bottom: 2px solid #222;
        }

        .hero h1 {
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .hero p {
            max-width: 560px;
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            color: #d0d0d0;
            font-weight: 300;
        }

        /* ===== ভিডিও সেকশন ===== */
        .video-section {
            padding: 30px 5% 50px;
            max-width: 900px;
            margin: 0 auto;
        }

        .section-title {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 600;
            margin-bottom: 30px;
            border-left: 5px solid #ff0000;
            padding-left: 16px;
        }

        /* ===== প্রতিটি কার্ড ===== */
        .video-card {
            background: #1a1a1a;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 30px;
            border: 1px solid #2c2c2c;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .video-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.7);
            border-color: #ff000055;
        }

        /* ===== থাম্বনেইল ===== */
        .thumb-wrap {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #111;
            overflow: hidden;
            cursor: pointer;
        }

        .thumb-wrap img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .video-card:hover .thumb-wrap img {
            transform: scale(1.04);
        }

        /* ===== প্লে ওভারলে ===== */
        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            transition: background 0.3s;
        }

        .thumb-wrap:hover .play-overlay {
            background: rgba(0, 0, 0, 0.5);
        }

        .play-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            transition: transform 0.25s;
        }

        .thumb-wrap:hover .play-btn {
            transform: scale(1.12);
        }

        .play-btn svg {
            width: 35px;
            height: 35px;
            fill: #111;
            margin-left: 6px;
        }

        /* ===== কার্ডের কন্টেন্ট ===== */
        .card-content {
            padding: 18px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .video-title {
            font-size: 1rem;
            font-weight: 600;
            color: #f0f0f0;
            flex: 1;
            min-width: 150px;
        }

        .video-meta {
            font-size: 0.8rem;
            color: #888;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .watch-link {
            display: inline-block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #ff0000;
            cursor: pointer;
            padding: 8px 24px;
            border-radius: 30px;
            border: 2px solid #ff0000;
            background: transparent;
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
            white-space: nowrap;
        }

        .watch-link:hover {
            background: #ff0000;
            color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.3); }
            70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        /* ===== মোডাল ===== */
        .modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.94);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-bg.open {
            display: flex;
        }

        .modal-box {
            position: relative;
            width: 100%;
            max-width: 880px;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.95);
        }

        .modal-video-wrap {
            position: relative;
            padding-top: 56.25%;
        }

        .modal-video-wrap iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #666;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background 0.25s;
            line-height: 1;
        }

        .modal-close:hover {
            background: #cc0000;
            border-color: #cc0000;
        }

        /* ===== ফুটার ===== */
        footer {
            text-align: center;
            padding: 30px 20px;
            background: #0a0a0a;
            border-top: 1px solid #1a1a1a;
            margin-top: 20px;
        }

        footer p {
            color: #555;
            font-size: 13px;
        }

        /* ===== মোবাইল ===== */
        @media (max-width: 600px) {
            .nav-links {
                display: none;
            }
            .logo {
                font-size: 18px;
            }
            .card-content {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .video-meta {
                justify-content: center;
            }
            .play-btn {
                width: 55px;
                height: 55px;
            }
            .play-btn svg {
                width: 28px;
                height: 28px;
            }
        }

        /* ===== স্ক্রল অ্যানিমেশন (ফেড ইন) ===== */
        .video-card {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* প্রতিটি কার্ডের জন্য ডেলি অ্যানিমেশন */
        .video-card:nth-child(1) { animation-delay: 0.05s; }
        .video-card:nth-child(2) { animation-delay: 0.10s; }
        .video-card:nth-child(3) { animation-delay: 0.15s; }
        .video-card:nth-child(4) { animation-delay: 0.20s; }
        .video-card:nth-child(5) { animation-delay: 0.25s; }
        .video-card:nth-child(6) { animation-delay: 0.30s; }
        .video-card:nth-child(7) { animation-delay: 0.35s; }
        .video-card:nth-child(8) { animation-delay: 0.40s; }
        .video-card:nth-child(9) { animation-delay: 0.45s; }
        .video-card:nth-child(10) { animation-delay: 0.50s; }
        .video-card:nth-child(11) { animation-delay: 0.55s; }
        .video-card:nth-child(12) { animation-delay: 0.60s; }
        .video-card:nth-child(13) { animation-delay: 0.65s; }
        .video-card:nth-child(14) { animation-delay: 0.70s; }
        .video-card:nth-child(15) { animation-delay: 0.75s; }
        .video-card:nth-child(16) { animation-delay: 0.80s; }
        .video-card:nth-child(17) { animation-delay: 0.85s; }
        .video-card:nth-child(18) { animation-delay: 0.90s; }
        .video-card:nth-child(19) { animation-delay: 0.95s; }
        .video-card:nth-child(20) { animation-delay: 1.00s; }
        .video-card:nth-child(21) { animation-delay: 1.05s; }
        .video-card:nth-child(22) { animation-delay: 1.10s; }
        .video-card:nth-child(23) { animation-delay: 1.15s; }
        .video-card:nth-child(24) { animation-delay: 1.20s; }
        .video-card:nth-child(25) { animation-delay: 1.25s; }
        .video-card:nth-child(26) { animation-delay: 1.30s; }
        .video-card:nth-child(27) { animation-delay: 1.35s; }
        .video-card:nth-child(28) { animation-delay: 1.40s; }
        .video-card:nth-child(29) { animation-delay: 1.45s; }
        .video-card:nth-child(30) { animation-delay: 1.50s; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">VideoTube6t9</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Trending</a></li>
            <li><a href="#">Subscriptions</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h1>🎬 Exclusive Content Awaits</h1>
        <p>Watch the latest trending videos from around the world. Scroll down to explore.</p>
    </header>

    <section class="video-section">
        <h2 class="section-title">🔥 Featured Videos</h2>

        <div class="video-grid" id="videoGrid">
            <!-- JavaScript দিয়ে ভিডিও লোড হবে -->
        </div>
    </section>

    <footer>
        <p>&copy; 2026 VideoTube6t9. All Rights Reserved.</p>
    </footer>

    <!-- ===== মোডাল ===== -->
    <div class="modal-bg" id="videoModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeVideo()">✕</button>
            <div class="modal-video-wrap">
                <iframe id="videoFrame" src="" allowfullscreen allow="autoplay; encrypted-media; fullscreen"></iframe>
            </div>
        </div>
    </div>

    <script>
        // ================================================
        // 📌 ৩০টি ইউটিউব ভিডিওর ডেটা
        // ================================================
        const videos = [
            { id: '9bZkp7q19f0', title: 'PSY - Gangnam Style', views: '4.8B views' },
            { id: 'JGwWNGJdvx8', title: 'Ed Sheeran - Shape of You', views: '6.2B views' },
            { id: 'RgKAFK5djSk', title: 'Wiz Khalifa - See You Again', views: '6.0B views' },
            { id: 'XqZsoesa55w', title: 'Maroon 5 - Sugar', views: '4.1B views' },
            { id: 'dQw4w9WgXcQ', title: 'Rick Astley - Never Gonna Give You Up', views: '1.8B views' },
            { id: 'z_HXoI-UAeU', title: 'AI Technology Explained', views: '2.3M views' },
            { id: 'VuOeefClQQY', title: 'Cinematic Travel Vlog 2024', views: '1.5M views' },
            { id: 's-vX_Ojn-10', title: 'Top 10 Coding Tips', views: '4.2M views' },
            { id: 'fJ9rUzIMcZQ', title: 'Queen - Bohemian Rhapsody', views: '2.1B views' },
            { id: 'k4V3Mo61fJM', title: 'Michael Jackson - Thriller', views: '1.3B views' },
            { id: 'OPf0YbXqDm0', title: 'Eminem - Lose Yourself', views: '1.7B views' },
            { id: 'hT_nvWreIhg', title: 'Beyoncé - Halo', views: '1.2B views' },
            { id: 'ktvTqknDobU', title: 'Adele - Hello', views: '3.1B views' },
            { id: 'YQHsXMglC9A', title: 'Coldplay - Viva La Vida', views: '2.2B views' },
            { id: 'nfs8NYg7yQM', title: 'Imagine Dragons - Believer', views: '3.4B views' },
            { id: 'CevxZvSJLk8', title: 'The Weeknd - Blinding Lights', views: '3.9B views' },
            { id: 'TgOu00Mf3kI', title: 'Dua Lipa - Levitating', views: '2.7B views' },
            { id: 'kJQP7kiw5Fk', title: 'Luis Fonsi - Despacito', views: '8.3B views' },
            { id: 'fLexgOxsZu0', title: 'Justin Bieber - Sorry', views: '3.3B views' },
            { id: 'L_jWHffIx5E', title: 'Taylor Swift - Shake It Off', views: '3.5B views' },
            { id: 'H6B2H9xqo0A', title: 'Amazing Nature 4K', views: '1.8M views' },
            { id: 'b8C9g1P0zLg', title: 'Top 5 Gadgets 2024', views: '2.1M views' },
            { id: 'KjN3V8mF9Gc', title: 'Learn Python in 10 Minutes', views: '3.4M views' },
            { id: 'QpR5qY7zT2w', title: 'Epic Gaming Highlights', views: '5.6M views' },
            { id: 'Xr9nFgH2jKl', title: 'Street Food Around the World', views: '4.2M views' },
            { id: 'MnBvCzXwQpR', title: 'SpaceX Starship Launch', views: '8.9M views' },
            { id: 'LkMnBvCzXwQ', title: 'Best Phone Under 20000', views: '1.2M views' },
            { id: 'ZxYwVuTsRqP', title: 'How to Start a YouTube Channel', views: '2.8M views' },
            { id: 'OqPtYsWvXzN', title: 'Funny Animal Compilation', views: '15.6M views' },
            { id: 'MkLpOqRtYwX', title: 'Top 10 Movies of All Time', views: '3.1M views' }
        ];

        // ================================================
        // 🏗️ ভিডিও কার্ড তৈরি করা
        // ================================================
        const grid = document.getElementById('videoGrid');

        videos.forEach((video, index) => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.style.animationDelay = (index * 0.04) + 's';

            card.innerHTML = `
                <div class="thumb-wrap" onclick="playVideo('${video.id}')">
                    <img src="https://img.youtube.com/vi/${video.id}/maxresdefault.jpg" alt="${video.title}" loading="lazy">
                    <div class="play-overlay">
                        <div class="play-btn">
                            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
                        </div>
                    </div>
                </div>
                <div class="card-content">
                    <div class="video-title">${video.title}</div>
                    <div class="video-meta">
                        <span>${video.views}</span>
                        <span class="watch-link" onclick="event.stopPropagation(); playVideo('${video.id}')">▶ Watch</span>
                    </div>
                </div>
            `;

            grid.appendChild(card);
        });

        // ================================================
        // 🎬 ভিডিও চালু ও বন্ধ
        // ================================================
        function playVideo(videoId) {
            if (!videoId) return;
            const iframe = document.getElementById('videoFrame');
            iframe.src = 'https://www.youtube.com/embed/' + videoId + '?autoplay=1&rel=0&modestbranding=1&playsinline=1';
            document.getElementById('videoModal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeVideo() {
            document.getElementById('videoFrame').src = '';
            document.getElementById('videoModal').classList.remove('open');
            document.body.style.overflow = '';
        }

        // মোডালের বাইরে ক্লিক করলে বন্ধ
        document.getElementById('videoModal').addEventListener('click', function(e) {
            if (e.target === this) closeVideo();
        });

        // Escape কী চাপলে বন্ধ
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeVideo();
        });

        console.log('✅ ৩০টি ভিডিও কার্ড লোড হয়েছে!');
        console.log('🎯 প্রতি লাইনে ১টি করে ভিডিও (রেসপন্সিভ)');
    </script>

</body>
</html>
