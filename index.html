<!DOCTYPE html>
<html>
<head>
    <title>Video Grid Test</title>
    <style>
        body { font-family: Arial; background: #111; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; max-width: 900px; margin: 0 auto; }
        .card { background: #222; border-radius: 8px; overflow: hidden; cursor: pointer; text-align: center; }
        .card img { width: 100%; display: block; }
        .card .watch-btn { display: block; padding: 12px; background: #ff0000; color: white; font-weight: bold; border: none; width: 100%; cursor: pointer; }
        .card .watch-btn:hover { background: #cc0000; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 999; align-items: center; justify-content: center; }
        .modal.open { display: flex; }
        .modal-box { max-width: 800px; width: 100%; background: #000; border-radius: 8px; overflow: hidden; position: relative; }
        .modal-box iframe { width: 100%; height: 400px; border: none; }
        .close-btn { position: absolute; top: 10px; right: 20px; color: white; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <h2 style="text-align:center;">🎬 ভিডিও গ্রিড টেস্ট</h2>
    <div class="grid" id="videoGrid"></div>

    <!-- Modal -->
    <div class="modal" id="myModal">
        <div class="modal-box">
            <span class="close-btn" onclick="closeVideo()">✕</span>
            <iframe id="videoFrame" src=""></iframe>
        </div>
    </div>

    <script>
        // ভিডিও আইডি এবং থাম্বনেইল লিংকের তালিকা
        const videos = [
            { id: '9bZkp7q19f0', thumb: 'https://i.ibb.co.com/8LBLjR2x/1280x720-17643602.webp' },
            { id: 'JGwWNGJdvx8', thumb: 'https://img.youtube.com/vi/JGwWNGJdvx8/maxresdefault.jpg' },
            { id: 'RgKAFK5djSk', thumb: 'https://img.youtube.com/vi/RgKAFK5djSk/maxresdefault.jpg' },
            { id: 'XqZsoesa55w', thumb: 'https://img.youtube.com/vi/XqZsoesa55w/maxresdefault.jpg' }
        ];

        // গ্রিড তৈরি করা
        const grid = document.getElementById('videoGrid');
        videos.forEach(v => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${v.thumb}" alt="Thumbnail" loading="lazy">
                <button class="watch-btn" onclick="playVideo('${v.id}')">▶ Watch</button>
            `;
            grid.appendChild(card);
        });

        // ভিডিও চালু করার ফাংশন
        function playVideo(id) {
            console.log('🎬 ভিডিও চালু হচ্ছে: ' + id);
            document.getElementById('videoFrame').src = 'https://www.youtube.com/embed/' + id + '?autoplay=1&rel=0';
            document.getElementById('myModal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        // ভিডিও বন্ধ করার ফাংশন
        function closeVideo() {
            document.getElementById('videoFrame').src = '';
            document.getElementById('myModal').classList.remove('open');
            document.body.style.overflow = '';
        }

        // Escape কী চাপলে বন্ধ হবে
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeVideo();
        });

        // মোডালের বাইরে ক্লিক করলে বন্ধ হবে
        document.getElementById('myModal').addEventListener('click', function(e) {
            if (e.target === this) closeVideo();
        });

        console.log('✅ টেস্ট গ্রিড লোড হয়েছে!');
    </script>

</body>
</html>
