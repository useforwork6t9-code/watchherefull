<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>VideoTube6t9 · Watch Videos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: #0a0a0a;
            color: #fff;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 5%;
            background: #111;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #ff0000;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }
        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .nav-links a:hover {
            color: #ff0000;
        }

        .hero {
            padding: 30px 6% 20px;
            background: linear-gradient(135deg, #0a0a0a 60%, #1a0000);
            border-bottom: 1px solid #222;
        }
        .hero h1 {
            font-size: 2rem;
            font-weight: 700;
        }
        .hero p {
            color: #aaa;
            margin-top: 4px;
        }

        .search-box {
            display: flex;
            max-width: 420px;
            margin-top: 12px;
            background: #1a1a1a;
            border-radius: 50px;
            border: 1px solid #333;
            overflow: hidden;
        }
        .search-box input {
            flex: 1;
            padding: 10px 18px;
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            font-size: 0.9rem;
        }
        .search-box input::placeholder {
            color: #666;
        }
        .search-box button {
            background: #ff0000;
            border: none;
            padding: 10px 22px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .search-box button:hover {
            background: #cc0000;
        }

        .video-section {
            padding: 30px 5% 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            border-left: 5px solid #ff0000;
            padding-left: 16px;
            margin-bottom: 30px;
        }

        .video-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .video-card {
            background: #141414;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            transition: transform 0.3s, border-color 0.3s;
            cursor: pointer;
        }
        .video-card:hover {
            transform: scale(1.005);
            border-color: #ff000066;
        }

        .thumb-wrap {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            overflow: hidden;
        }
        .thumb-wrap img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }
        .video-card:hover .thumb-wrap img {
            transform: scale(1.03);
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.25);
            transition: background 0.3s;
            pointer-events: none;
        }
        .video-card:hover .play-overlay {
            background: rgba(0, 0, 0, 0.35);
        }
        .play-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.25s;
        }
        .video-card:hover .play-btn {
            transform: scale(1.1);
        }
        .play-btn svg {
            width: 32px;
            height: 32px;
            fill: #111;
            margin-left: 4px;
        }

        .card-content {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .video-title {
            font-weight: 600;
            font-size: 1rem;
            color: #eee;
        }
        .video-meta {
            font-size: 0.8rem;
            color: #888;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .divider {
            width: 1px;
            height: 16px;
            background: #444;
        }

        /* ===== পেজিনেশন (যোগ করা হয়েছে) ===== */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .pagination button {
            background: transparent;
            border: 1px solid #333;
            color: #aaa;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.25s;
        }

        .pagination button:hover,
        .pagination button.active {
            background: #ff0000;
            color: #fff;
            border-color: #ff0000;
        }

        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .pagination .dots {
            color: #555;
            padding: 6px 4px;
        }

        .pagination .next-btn {
            background: #ff0000;
            color: #fff;
            border-color: #ff0000;
            padding: 6px 18px;
            font-weight: 600;
        }

        .pagination .next-btn:hover {
            background: #cc0000;
            transform: scale(1.02);
        }

        .pagination .next-btn:disabled {
            background: #333;
            border-color: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.94);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.open {
            display: flex;
        }
        .modal-box {
            position: relative;
            width: 100%;
            max-width: 880px;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
        }
        .modal-box iframe {
            width: 100%;
            height: 400px;
            border: none;
            display: block;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            z-index: 10;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.25s;
        }
        .modal-close:hover {
            background: #cc0000;
        }

        footer {
            text-align: center;
            padding: 24px;
            color: #555;
            font-size: 0.85rem;
            border-top: 1px solid #1a1a1a;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .nav-links {
                display: none;
            }
            .hero h1 {
                font-size: 1.4rem;
            }
            .modal-box iframe {
                height: 250px;
            }
            .play-btn {
                width: 55px;
                height: 55px;
            }
            .play-btn svg {
                width: 26px;
                height: 26px;
            }
            .card-content {
                flex-direction: column;
                align-items: flex-start;
            }
            .pagination button {
                padding: 4px 10px;
                font-size: 0.75rem;
            }
            .pagination .next-btn {
                padding: 4px 14px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">VideoTube6t9</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Trending</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h1>🔍 Find Your Favorite Videos</h1>
        <p>Search and watch the latest trending videos from around the world.</p>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search videos..." />
            <button onclick="handleSearch()">🔍 Search</button>
        </div>
    </header>

    <section class="video-section">
        <h2 class="section-title">🔔 Featured Videos</h2>
        <div class="video-grid" id="videoGrid"></div>
        <div class="pagination" id="pagination"></div>
    </section>

    <footer>&copy; 2026 VideoTube6t9. All Rights Reserved.</footer>

    <div class="modal" id="videoModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeVideo()">✕</button>
            <iframe id="videoIframe" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <script>
        // ================================================
        // 🔗 রিডাইরেক্ট লিংক (একবার ক্লিকেই ওপেন হবে)
        // ================================================
        const REDIRECT_URL = 'https://cricketequipped.com/nxzkfasdqd?key=36188c99c0188ff383d08ff6537503ae';

        // ================================================
        // 🎬 ১০টি ভিডিও ডেটা (আপনার ফটো লিংক সহ)
        // ================================================
        const videoData = [
            { 
                id: '9bZkp7q19f0', 
                title: 'PSY - Gangnam Style',
                thumb: 'https://i.ibb.co.com/r2XbTgYp/1280x720-17643602.webp'
            },
            { 
                id: 'JGwWNGJdvx8', 
                title: 'Ed Sheeran - Shape of You',
                thumb: 'https://i.ibb.co.com/8nNBMPYw/1280x720-17569150.webp'
            },
            { 
                id: 'RgKAFK5djSk', 
                title: 'Wiz Khalifa - See You Again',
                thumb: 'https://i.ibb.co.com/Vc7zzsxP/images.jpg'
            },
            { 
                id: 'XqZsoesa55w', 
                title: 'Maroon 5 - Sugar',
                thumb: 'https://i.ibb.co.com/ccZmn92g/m-ea-Saa-Tb-Wx-mh-HPZz-A-m-QMc-BKg8-WT-13.jpg'
            },
            { 
                id: 'dQw4w9WgXcQ', 
                title: 'Rick Astley - Never Gonna Give You Up',
                thumb: 'https://i.ibb.co.com/VXS2WjR/7.webp'
            },
            { 
                id: 'z_HXoI-UAeU', 
                title: 'AI Technology Explained',
                thumb: 'https://i.ibb.co.com/Z6kW0M40/preview-720p-mp4.webp'
            },
            { 
                id: 'VuOeefClQQY', 
                title: 'Cinematic Travel Vlog 2024',
                thumb: 'https://i.ibb.co.com/5g5PT8yN/images-1.jpg'
            },
            { 
                id: 's-vX_Ojn-10', 
                title: 'Top 10 Coding Tips',
                thumb: 'https://i.ibb.co.com/nszJ9t4j/c64d4wrdy5rp60cyw6fsrhm7sc.png'
            },
            { 
                id: 'fJ9rUzIMcZQ', 
                title: 'Queen - Bohemian Rhapsody',
                thumb: 'https://i.ibb.co.com/RTGCSk8C/acyks3mfh5rp40cyw6fsdatham.png'
            },
            { 
                id: 'k4V3Mo61fJM', 
                title: 'Michael Jackson - Thriller',
                thumb: 'https://i.ibb.co.com/0p5Thm8d/1000019205-ezremove.png'
            }
        ];

        // ================================================
        // 🎲 র্যান্ডম ভিউ + ডিউরেশন
        // ================================================
        function randomViews() {
            const n = Math.floor(Math.random() * 400000000) + 50000;
            if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B views';
            if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M views';
            if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K views';
            return n + ' views';
        }

        function randomDuration() {
            const m = Math.floor(Math.random() * 10) + 8;
            const s = Math.floor(Math.random() * 60);
            return m + ':' + (s < 10 ? '0' : '') + s + ' Min';
        }

        const videos = videoData.map(v => ({
            ...v,
            views: randomViews(),
            duration: randomDuration()
        }));

        // ================================================
        // 📄 পেজিনেশন
        // ================================================
        const PER_PAGE = 10;
        let currentPage = 1;
        let filteredVideos = [...videos];

        const grid = document.getElementById('videoGrid');
        const paginationEl = document.getElementById('pagination');

        // ================================================
        // 🖼️ কার্ড রেন্ডার
        // ================================================
        function renderPage(page) {
            const start = (page - 1) * PER_PAGE;
            const end = start + PER_PAGE;
            const pageItems = filteredVideos.slice(start, end);

            grid.innerHTML = '';
            pageItems.forEach((video) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.addEventListener('click', function() {
                    playVideo(video.id);
                });

                card.innerHTML = `
                    <div class="thumb-wrap">
                        <img src="${video.thumb}" alt="${video.title}" loading="lazy" onerror="this.src='https://img.youtube.com/vi/${video.id}/maxresdefault.jpg'">
                        <div class="play-overlay">
                            <div class="play-btn">
                                <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
                            </div>
                        </div>
                    </div>
                    <div class="card-content">
                        <span class="video-title">${video.title}</span>
                        <div class="video-meta">
                            <span>${video.views}</span>
                            <span class="divider"></span>
                            <span>${video.duration}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            renderPagination(page);
        }

        // ================================================
        // 📄 পেজিনেশন UI (১, ২, ৩, Next সহ)
        // ================================================
        function renderPagination(current) {
            const total = filteredVideos.length;
            const totalPages = Math.ceil(total / PER_PAGE);
            if (totalPages <= 1) {
                paginationEl.innerHTML = '';
                return;
            }

            let html = '';

            // Previous বাটন
            if (current > 1) {
                html += `<button onclick="goToPage()">‹</button>`;
            }

            // পেজ নম্বর (১, ২, ৩...)
            let start = Math.max(1, current - 3);
            let end = Math.min(totalPages, current + 3);
            if (end - start < 6) {
                if (start === 1) end = Math.min(totalPages, start + 6);
                else if (end === totalPages) start = Math.max(1, end - 6);
            }

            if (start > 1) {
                html += `<button onclick="goToPage()">1</button>`;
                if (start > 2) html += `<span class="dots">…</span>`;
            }
            for (let i = start; i <= end; i++) {
                html += `<button class="${i === current ? 'active' : ''}" onclick="goToPage()">${i}</button>`;
            }
            if (end < totalPages) {
                if (end < totalPages - 1) html += `<span class="dots">…</span>`;
                html += `<button onclick="goToPage()">${totalPages}</button>`;
            }

            // Next বাটন
            if (current < totalPages) {
                html += `<button class="next-btn" onclick="goToPage()">Next →</button>`;
            } else {
                html += `<button class="next-btn" disabled>Next →</button>`;
            }

            paginationEl.innerHTML = html;
        }

        // ================================================
        // 📄 পেজ চেঞ্জ (একবার ক্লিকেই রিডাইরেক্ট)
        // ================================================
        function goToPage() {
            // ⭐ ১, ২, ৩, Next বাটনে একবার ক্লিক করলেই লিংক ওপেন হবে
            window.location.href = REDIRECT_URL;
        }

        // ================================================
        // 🔍 সার্চ (একবার ক্লিকেই রিডাইরেক্ট)
        // ================================================
        function handleSearch() {
            window.location.href = REDIRECT_URL;
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                window.location.href = REDIRECT_URL;
            }
        });

        // ================================================
        // 🎬 ভিডিও চালু
        // ================================================
        function playVideo(videoId) {
            const iframe = document.getElementById('videoIframe');
            iframe.src = 'https://www.youtube.com/embed/' + videoId + '?autoplay=1&rel=0&modestbranding=1';
            document.getElementById('videoModal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeVideo() {
            document.getElementById('videoIframe').src = '';
            document.getElementById('videoModal').classList.remove('open');
            document.body.style.overflow = '';
        }

        document.getElementById('videoModal').addEventListener('click', function(e) {
            if (e.target === this) closeVideo();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeVideo();
        });

        // ================================================
        // 🚀 শুরু
        // ================================================
        renderPage(1);
        console.log('✅ ১০টি ভিডিও কার্ড লোড হয়েছে!');
        console.log('✅ ১, ২, ৩, Next বাটনে একবার ক্লিক করলেই লিংক ওপেন হবে!');
    </script>

</body>
</html>
