<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>VideoTube6t9 · Premium Video</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ===== রিসেট ও বেসিক ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0f0f0f;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== নেভিগেশন ===== */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 5%;
            background: rgba(0, 0, 0, 0.95);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #2a2a2a;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #ff0000;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 24px;
        }

        .nav-links a {
            text-decoration: none;
            color: #f0f0f0;
            font-size: 0.9rem;
        }

        .nav-links a:hover {
            color: #ff0000;
        }

        /* ===== হিরো ===== */
        .hero {
            min-height: 45vw;
            max-height: 60vh;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.88), rgba(0, 0, 0, 0.45)),
                url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 6%;
            border-bottom: 2px solid #222;
        }

        .hero h1 {
            font-size: clamp(1.6rem, 5vw, 3.2rem);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .hero p {
            max-width: 560px;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            color: #d0d0d0;
            font-weight: 300;
        }

        /* ===== ভিডিও সেকশন ===== */
        .video-section {
            padding: 40px 5% 30px;
        }

        .section-title {
            font-size: clamp(1.1rem, 4vw, 1.6rem);
            font-weight: 600;
            margin-bottom: 28px;
            border-left: 5px solid #ff0000;
            padding-left: 16px;
        }

        /* ===== গ্রিড ===== */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        @media (min-width: 700px) {
            .video-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 24px;
            }
        }

        @media (min-width: 1000px) {
            .video-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 28px;
            }
        }

        @media (max-width: 400px) {
            .video-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }
        }

        /* ===== কার্ড ===== */
        .video-card {
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2c2c2c;
            transition: transform 0.25s, box-shadow 0.3s;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.5);
        }

        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.7);
        }

        /* ===== থাম্বনেইল ===== */
        .thumb-wrap {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 */
            background: #111;
            overflow: hidden;
        }

        .thumb-wrap img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
            display: block;
        }

        .video-card:hover .thumb-wrap img {
            transform: scale(1.05);
        }

        /* ===== ওয়াচ বাটন ===== */
        .card-content {
            padding: 14px 12px 16px;
            text-align: center;
        }

        .watch-link {
            display: inline-block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #ff0000;
            text-decoration: none;
            letter-spacing: 0.5px;
            cursor: pointer;
            padding: 8px 28px;
            border-radius: 30px;
            border: 2px solid #ff0000;
            background: transparent;
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
        }

        .watch-link:hover {
            background: #ff0000;
            color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.4);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        /* ===== মোডাল (পপ-আপ) ===== */
        .modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-bg.open {
            display: flex;
        }

        .modal-box {
            position: relative;
            width: 100%;
            max-width: 880px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.95);
        }

        .modal-video-wrap {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 ফিক্সড, লেআউট শিফট হবে না */
            background: #000;
        }

        .modal-video-wrap iframe,
        .modal-video-wrap .sp-embed-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ScreenPal-এর জন্য অতিরিক্ত ঠিক করা */
        .modal-video-wrap .sp-embed-player {
            padding-top: 0 !important;
            height: 100% !important;
        }

        .modal-close {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #666;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background 0.2s;
            line-height: 1;
        }

        .modal-close:hover {
            background: #cc0000;
            border-color: #cc0000;
        }

        /* ===== ফুটার ===== */
        footer {
            text-align: center;
            padding: 36px 20px;
            background: #0a0a0a;
            margin-top: 50px;
            border-top: 1px solid #222;
        }

        footer p {
            color: #6a6a6a;
            font-size: 13px;
        }

        /* ===== মোবাইল ===== */
        @media (max-width: 600px) {
            .nav-links {
                display: none;
            }
            .logo {
                font-size: 18px;
            }
        }
    </style>
</head>
