            border-radius: 50px;
            padding: 2px 4px 2px 18px;

        .search-box:focus-within {
            border-color: #ff0000;

        .search-box input {

            color: #fff;
            font-size: 0.9rem;
            padding: 10px 0;
            font-weight: 300;

        .search-box input::placeholder {

            color: #fff;
            font-weight: 600;
            font-size: 0.8rem;

            align-items: center;

        .search-box button:hover {

        .search-box button svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 30px;

            transition: transform 0.3s, box-shadow 0.3s;

        }

        .video-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.7);
            border-color: #ff000055;
        }

        .thumb-wrap {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #111;
            overflow: hidden;
        }

        .thumb-wrap img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .video-card:hover .thumb-wrap img {
            transform: scale(1.04);
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            transition: background 0.3s;
            pointer-events: none;
        }

        .video-card:hover .play-overlay {
            background: rgba(0, 0, 0, 0.5);
        }

        .play-btn {

            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            transition: transform 0.25s;
        }

        .video-card:hover .play-btn {
            transform: scale(1.12);
        }

        .play-btn svg {
            width: 35px;
            height: 35px;
            fill: #111;
            margin-left: 6px;
        }

        .card-content {
            padding: 14px 20px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .video-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #f0f0f0;
            flex: 1;
            min-width: 120px;
        }

        .video-meta {
            font-size: 0.75rem;
            color: #888;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .divider-line {
            width: 1px;
            height: 18px;
            background: #444;
            display: inline-block;
        }

        /* ===== মোডাল ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.94);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.open {
            display: flex;
        }
        .modal-box {
            position: relative;
            width: 100%;
            max-width: 880px;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
        }
        .modal-box iframe {
            width: 100%;
            height: 400px;
            border: none;
            display: block;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            z-index: 10;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.25s;
        }
        .modal-close:hover {
            background: #cc0000;
        }

        /* ===== পেজিনেশন ===== */

            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin: 30px 0 20px;
            padding: 10px 0;

        .pagination button {

            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;

            font-weight: 500;

        .pagination button:hover {
            background: #ff0000;
            color: #fff;
            border-color: #ff0000;
        }

        .pagination button.active {
            background: #ff0000;
            color: #fff;
            border-color: #ff0000;
        }

        .pagination button:disabled {

            color: #555;
            padding: 0 4px;
            font-size: 0.9rem;

        footer {

            padding: 20px 20px;

    </style>
</head>
<body>

        // ================================================
        // 🎲 র্যান্ডম ভিউ ও ডিউরেশন
        // ================================================
        function randomViews() {
            const num = Math.floor(Math.random() * 500000000) + 50000;
            if (num >= 1000000000) return (num / 1000000000).toFixed(1) + 'B views';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M views';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K views';
            return num + ' views';
        }

        function randomDuration() {
            const mins = Math.floor(Math.random() * 10) + 8;
            const secs = Math.floor(Math.random() * 60);
            return mins + ':' + (secs < 10 ? '0' : '') + secs + ' Min';
        }

        const videos = allVideos.map(v => ({
            ...v,
            views: randomViews(),

            const start = (page - 1) * PER_PAGE;

                    playVideo(video.id);
                });

                card.innerHTML = `

                    <div class="card-content">
